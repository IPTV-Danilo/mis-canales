name: Actualizador Automatico IPTV
on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch: 

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extraer Links con User-Agent Real
        run: |
          # Usamos un User-Agent de Chrome para que no nos bloqueen
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "Extrayendo Canales..."
          
          FOX2=$(curl -s -L -A "$USER_AGENT" "https://streamtpnew.com/global1.php?stream=fox2ar" | grep -oE "https?://[^\s'\"]+\.m3u8[^\s'\"]*" | head -n 1 | sed 's/\\//g')
          TNT=$(curl -s -L -A "$USER_AGENT" "https://streamtpnew.com/global1.php?stream=tntsports" | grep -oE "https?://[^\s'\"]+\.m3u8[^\s'\"]*" | head -n 1 | sed 's/\\//g')
          ESPN=$(curl -s -L -A "$USER_AGENT" "https://streamtpnew.com/global1.php?stream=espnpremium" | grep -oE "https?://[^\s'\"]+\.m3u8[^\s'\"]*" | head -n 1 | sed 's/\\//g')

          # Crear el archivo M3U
          echo "#EXTM3U" > lista_fresca.m3u
          echo "#EXTINF:-1, Fox Sports 2" >> lista_fresca.m3u
          echo "$FOX2" >> lista_fresca.m3u
          echo "#EXTINF:-1, TNT Sports" >> lista_fresca.m3u
          echo "$TNT" >> lista_fresca.m3u
          echo "#EXTINF:-1, ESPN Premium" >> lista_fresca.m3u
          echo "$ESPN" >> lista_fresca.m3u
          
          echo "Contenido generado:"
          cat lista_fresca.m3u

      - name: Guardar cambios
        run: |
          git config --global user.name "Daniel-Bot"
          git config --global user.email "bot@github.com"
          git add lista_fresca.m3u
          git commit -m "Actualizacion automatica de canales" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
