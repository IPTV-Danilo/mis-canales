<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel IPTV Daniel - Control Total</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #eee; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 25px; border-radius: 15px; display: inline-block; width: 95%; max-width: 500px; border: 1px solid #333; box-shadow: 0 8px 32px rgba(0,0,0,0.8); }
        .canal-card { background: #252525; margin: 12px 0; padding: 15px; border-radius: 10px; text-align: left; border-left: 5px solid #00d4ff; }
        label { font-size: 0.85em; color: #00d4ff; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #444; background: #000; color: #00ff41; font-family: monospace; box-sizing: border-box; }
        button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue:active, .btn-green:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-weight: bold; color: #ffc107; min-height: 24px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="margin-top:0">IPTV Manager v2</h2>
    
    <div class="canal-card">
        <label>Fox Sports 2</label>
        <input type="text" id="url_fox2" readonly placeholder="Esperando...">
    </div>
    
    <div class="canal-card">
        <label>TNT Sports</label>
        <input type="text" id="url_tnt" readonly placeholder="Esperando...">
    </div>
    
    <div class="canal-card">
        <label>ESPN Premium</label>
        <input type="text" id="url_espn" readonly placeholder="Esperando...">
    </div>

    <button class="btn-blue" onclick="extraer()">1. CAPTURAR LINKS DESDE ARGENTINA</button>
    
    <div style="margin: 20px 0; border-top: 1px solid #333;"></div>
    
    <input type="password" id="token_input" placeholder="Pegá tu Token (ghp_...)">
    
    <button class="btn-green" onclick="actualizarGitHub()">2. SUBIR LISTA A GITHUB</button>
    
    <div id="status">Listo para iniciar</div>
</div>

<script>
    const USER = "danilocrypto81-ops";
    const REPO = "mis-canales";
    
    const CONFIG = [
        { id: 'url_fox2', nombre: 'Fox Sports 2', url: 'https://streamtpnew.com/global1.php?stream=fox2ar' },
        { id: 'url_tnt', nombre: 'TNT Sports', url: 'https://streamtpnew.com/global1.php?stream=tntsports' },
        { id: 'url_espn', nombre: 'ESPN Premium', url: 'https://streamtpnew.com/global1.php?stream=espnpremium' }
    ];

    async function extraer() {
        const stat = document.getElementById('status');
        stat.innerText = "⏳ Extrayendo datos de las webs...";
        
        for (let c of CONFIG) {
            const field = document.getElementById(c.id);
            try {
                // Usamos el gadget de Google para saltar el CORS
                const proxy = "https://images" + ~~(Math.random() * 33) + "-focus-opensocial.googleusercontent.com/gadgets/proxy?container=none&url=" + encodeURIComponent(c.url);
                const res = await fetch(proxy);
                const text = await res.text();
                const match = text.match(/(https?:\/\/[^\s'"]+\.m3u8[^\s'"]*)/);
                
                if (match) {
                    field.value = match[0].replace(/\\/g, '');
                } else {
                    field.value = "❌ No encontrado";
                }
            } catch (e) { field.value = "❌ Error de red"; }
        }
        stat.innerText = "✅ Links listos para subir.";
    }

    async function actualizarGitHub() {
        const stat = document.getElementById('status');
        const token = document.getElementById('token_input').value;
        
        if (!token) { alert("Ingresá tu token ghp_ para autorizar."); return; }

        let m3u = "#EXTM3U\n";
        CONFIG.forEach(c => {
            const link = document.getElementById(c.id).value;
            if (link.startsWith("http")) {
                m3u += `#EXTINF:-1, ${c.nombre}\n${link}\n`;
            }
        });

        stat.innerText = "📤 Conectando con la API de GitHub...";

        try {
            // Buscamos el SHA del archivo para poder sobreescribirlo
            const urlFile = `https://api.github.com/repos/${USER}/${REPO}/contents/lista_fresca.m3u`;
            const resGet = await fetch(urlFile, {
                headers: { "Authorization": `token ${token}` }
            });
            
            let sha = "";
            if (resGet.ok) {
                const data = await resGet.json();
                sha = data.sha;
            }

            // Subimos el archivo directamente
            const resPut = await fetch(urlFile, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Actualización manual desde Panel",
                    content: btoa(unescape(encodeURIComponent(m3u))),
                    sha: sha
                })
            });

            if (resPut.ok) {
                stat.innerHTML = "<span style='color:#28a745'>🚀 ¡Archivo actualizado con éxito!</span>";
                document.getElementById('token_input').value = "";
            } else {
                stat.innerText = "❌ Error al subir. Revisá los permisos del Token.";
            }
        } catch (e) { stat.innerText = "❌ Error técnico."; }
    }
</script>
</body>
</html>
